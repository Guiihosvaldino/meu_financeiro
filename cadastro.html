<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Gestão Financeira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #5176fd79; }
        .card { border-radius: 15px; }
        .btn-primary { background-color: #0d6efd; border: none; }
    </style>
    <!-- Ícone para Android e navegadores de PC -->
<link rel="icon" type="image/png" href="logo.png">

<!-- Ícone específico para iPhone/iOS (é o que resolve o seu print) -->
<link rel="apple-touch-icon" href="logo.png">

<!-- Configuração de cor da barra do navegador no celular -->
<meta name="theme-color" content="#3b4d8d">
</head>
<body class="d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Criar Conta</h3>
                        <p class="text-muted">Comece a organizar suas finanças hoje</p>
                    </div>

                    <form id="formCadastro">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" id="email" class="form-control" placeholder="nome@exemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" id="senha" class="form-control" placeholder="Crie uma senha" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Cadastrar</button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted small">Já tem uma conta?</span>
                        <a href="login.html" class="text-primary small fw-bold text-decoration-none">Faça Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formCadastro').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch('auth.php?acao=cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    alert("Conta criada com sucesso! Agora você pode entrar.");
                    window.location.href = 'login.html';
                } else {
                    alert("Erro: " + (resultado.erro || "Falha ao cadastrar"));
                }
            } catch (erro) {
                console.error("Erro na conexão:", erro);
                alert("Erro ao conectar com o servidor.");
            }
        });
    </script>
</body>
</html>
