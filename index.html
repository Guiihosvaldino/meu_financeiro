<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Controle de Gastos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 10px; }
    </style>
    <!-- Ícone para Android e navegadores de PC -->
<link rel="icon" type="image/png" href="logo.png">

<!-- Ícone específico para iPhone/iOS (é o que resolve o seu print) -->
<link rel="apple-touch-icon" href="logo.png">

<!-- Configuração de cor da barra do navegador no celular -->
<meta name="theme-color" content="#3b4d8d">
</head>
<body>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-secondary mb-0">📊 Gestão Financeira Pessoal</h2>
            <button onclick="logout()" class="btn btn-sm btn-light">Sair</button>
        </div>
        
        <div class="row mb-3">
            
            <div class="col-md-12 d-flex gap-2 align-items-end flex-wrap">
                <div>
                    <label class="form-label small fw-bold">Início</label>
                    <input type="date" id="filtro_inicio" class="form-control form-control-sm">
                </div>
                <div>
                    <label class="form-label small fw-bold">Fim</label>
                    <input type="date" id="filtro_fim" class="form-control form-control-sm">
                </div>
                <button onclick="carregarGastosComFiltro()" class="btn btn-primary btn-sm px-3">Filtrar</button>
                <div class="btn-group">
                    <button onclick="setarPeriodo('hoje')" class="btn btn-outline-secondary btn-sm">Hoje</button>
                    <button onclick="setarPeriodo('semana')" class="btn btn-outline-secondary btn-sm">Semana</button>
                    <button onclick="setarPeriodo('mes')" class="btn btn-outline-secondary btn-sm">Mês</button>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card bg-danger text-white shadow-sm h-100">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h6 class="card-title opacity-75">Total de Gastos no Período</h6>
                        <h2 id="totalGastos" class="fw-bold">R$ 0,00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-8 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <canvas id="graficoGastos" style="max-height: 200px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Novo Gasto</h5>
                        <form id="formGasto">
                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <input type="text" id="descricao" class="form-control" placeholder="Ex: Lâminas novas" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" id="valor" class="form-control" placeholder="0,00" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                <select id="categoria_id" class="form-select">
                                    <option value="1">Insumos/Trabalho</option>
                                    <option value="2">Custos Fixos</option>
                                    <option value="3">Lazer/Pessoal</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 fw-bold">Registrar Gasto</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Histórico de Gastos</h5>
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Data</th>
                                        <th>Descrição</th>
                                        <th>Categoria</th>
                                        <th>Valor</th>
                                        <th>Ação</th>
                                    </tr>
                                </thead>
                                <tbody id="listaGastos">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="main.js"></script>
</body>
</html>
