<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Meu Financeiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h4 class="text-center mb-4">Nova Senha</h4>
                        <form id="formReset">
                            <input type="hidden" id="token">
                            <div class="mb-3">
                                <label class="form-label">Digite a nova senha</label>
                                <input type="password" id="novaSenha" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Confirme a nova senha</label>
                                <input type="password" id="confirmaSenha" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Alterar Senha</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Captura o token que virá na URL (?token=xyz)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            alert("Token inválido ou ausente.");
            window.location.href = 'login.html';
        } else {
            document.getElementById('token').value = token;
        }

        document.getElementById('formReset').addEventListener('submit', async (e) => {
            e.preventDefault();
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            if (novaSenha !== confirmaSenha) {
                alert("As senhas não coincidem!");
                return;
            }

            const response = await fetch('backend/api/auth.php?acao=resetar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, novaSenha })
            });

            const res = await response.json();
            alert(res.mensagem);
            if (response.ok) window.location.href = 'login.html';
        });
    </script>
</body>
</html>
